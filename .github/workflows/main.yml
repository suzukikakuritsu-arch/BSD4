name: BSD CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: true

      # ★ ここが必須
      - name: Generate lake manifest
        run: lake update

      # ★ ビルド
      - name: Build project
        run: lake build
