name: Lean CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: true

      # ★ 必須：プロジェクト認識
      - name: Check files
        run: ls -la

      # ★ 必須：manifest生成
      - name: Generate lake manifest
        run: lake update

      # ★ ビルド
      - name: Build
        run: lake build
